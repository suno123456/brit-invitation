<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>פאנל ניהול אירועים</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="text-slate-800 pb-12">

  <nav class="bg-white shadow-sm p-4 flex justify-between items-center border-b-4 border-blue-500">
    <h1 class="text-xl font-bold text-blue-600">מערכת אישורי הגעה</h1>
    <button id="logoutBtn" class="text-sm bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg font-medium transition">התנתק</button>
  </nav>

  <div class="max-w-4xl mx-auto p-4 mt-6 space-y-8">
    
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="p-6 bg-slate-50 border-b border-slate-100">
        <h3 class="text-lg font-bold">הגדרות האירוע שלך</h3>
        <p class="text-sm text-slate-500 mt-1">הפרטים שימולאו כאן יוצגו אוטומטית בדף ההזמנה שלכם.</p>
      </div>
      
      <form id="eventSettingsForm" class="p-6 space-y-4 text-sm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-bold mb-1">שם האירוע (למשל: הברית של איתי)</label>
            <input type="text" id="eventName" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">קישור לתמונה (URL של תמונה ברשת)</label>
            <input type="text" id="imageUrl" placeholder="https://..." class="w-full border p-2 rounded-lg text-left bg-slate-50" dir="ltr">
          </div>
          <div>
            <label class="block font-bold mb-1">תאריך</label>
            <input type="date" id="eventDate" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">שעה</label>
            <input type="time" id="eventTime" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">שם האולם/מקום</label>
            <input type="text" id="locationName" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">קישור לווייז (Waze)</label>
            <input type="text" id="wazeLink" placeholder="https://waze.com/..." class="w-full border p-2 rounded-lg text-left bg-slate-50" dir="ltr">
          </div>
          <div class="md:col-span-2">
            <label class="block font-bold mb-1 text-blue-600">קישור ל-Bit (לקבלת מתנות)</label>
            <input type="text" id="bitLink" placeholder="https://www.bitpay.co.il/app/me/..." class="w-full border p-2 rounded-lg text-left bg-blue-50" dir="ltr">
          </div>
        </div>
        <button type="submit" id="saveEventBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition mt-4 w-full md:w-auto">
          שמור שינויים
        </button>
        <p id="saveMsg" class="text-green-600 font-bold hidden mt-2">הנתונים נשמרו בהצלחה!</p>
      </form>
    </div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="p-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
        <h3 class="text-lg font-bold">רשימת אורחים</h3>
        <span id="totalGuests" class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">סה"כ מגיעים: 0</span>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse">
          <thead>
            <tr class="bg-slate-100 text-slate-600 text-sm">
              <th class="p-4 font-bold border-b">שם האורח</th>
              <th class="p-4 font-bold border-b">מגיע?</th>
              <th class="p-4 font-bold border-b text-center">כמות</th>
              <th class="p-4 font-bold border-b">ברכה</th>
            </tr>
          </thead>
          <tbody id="guestsTableBody" class="text-sm">
            <tr><td colspan="4" class="p-6 text-center text-slate-500">טוען אורחים...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentEventId = null;

    async function init() {
      const { data: { user } } = await mySupabase.auth.getUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      loadEventDetails();
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await mySupabase.auth.signOut();
      window.location.href = 'login.html';
    });

    async function loadEventDetails() {
      let { data: events, error } = await mySupabase.from('events').select('*').eq('host_id', currentUser.id);
      
      if (!events || events.length === 0) {
        const { data: newEvent } = await mySupabase.from('events').insert([{ 
           host_id: currentUser.id, 
           event_name: 'האירוע שלי', 
           slug: 'event-' + Math.floor(Math.random()*10000) 
        }]).select();
        events = newEvent;
      }
      
      const event = events[0];
      currentEventId = event.id;
      
      document.getElementById('eventName').value = event.event_name || '';
      document.getElementById('imageUrl').value = event.image_url || '';
      document.getElementById('eventDate').value = event.event_date ? event.event_date.split('T')[0] : '';
      document.getElementById('eventTime').value = event.event_time || '';
      document.getElementById('locationName').value = event.location_name || '';
      document.getElementById('wazeLink').value = event.waze_link || '';
      document.getElementById('bitLink').value = event.bit_link || '';
      
      loadGuests();
    }

    document.getElementById('eventSettingsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveEventBtn');
      btn.innerText = 'שומר...';
      btn.disabled = true;

      const updates = {
        event_name: document.getElementById('eventName').value,
        image_url: document.getElementById('imageUrl').value,
        event_date: document.getElementById('eventDate').value,
        event_time: document.getElementById('eventTime').value,
        location_name: document.getElementById('locationName').value,
        waze_link: document.getElementById('wazeLink').value,
        bit_link: document.getElementById('bitLink').value,
      };

      const { error } = await mySupabase.from('events').update(updates).eq('id', currentEventId);
      
      btn.innerText = 'שמור שינויים';
      btn.disabled = false;
      
      if(!error) {
        const msg = document.getElementById('saveMsg');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 3000);
      } else {
        alert('אירעה שגיאה בשמירה');
      }
    });

    async function loadGuests() {
      const { data: guests, error } = await mySupabase
        .from('guests')
        .select('*')
        .eq('event_id', currentEventId)
        .order('created_at', { ascending: false });

      const tbody = document.getElementById('guestsTableBody');
      tbody.innerHTML = '';
      let totalCount = 0;

      if (error) return;

      if (guests.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-500">עדיין אין אישורי הגעה.</td></tr>';
        return;
      }

      guests.forEach(guest => {
        if (guest.attending) totalCount += (guest.guests_count || 0);
        const row = document.createElement('tr');
        row.className = 'border-b hover:bg-slate-50 transition';
        row.innerHTML = `
          <td class="p-4 font-medium">${guest.guest_name}</td>
          <td class="p-4">
            <span class="px-3 py-1 rounded-full text-xs font-bold ${guest.attending ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${guest.attending ? 'כן' : 'לא'}</span>
          </td>
          <td class="p-4 text-center font-bold">${guest.attending ? guest.guests_count : '-'}</td>
          <td class="p-4 text-slate-600">${guest.blessing || ''}</td>
        `;
        tbody.appendChild(row);
      });
      document.getElementById('totalGuests').innerText = `סה"כ מגיעים: ${totalCount}`;
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
