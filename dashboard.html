<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>פאנל ניהול - מערכת אישורי הגעה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

  <nav class="bg-white shadow-sm p-4 flex justify-between items-center border-b-4 border-blue-500">
    <h1 class="text-xl font-bold text-blue-600">מערכת אישורי הגעה</h1>
    <button id="logoutBtn" class="text-sm bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg font-medium transition">התנתק</button>
  </nav>

  <div class="max-w-4xl mx-auto p-4 mt-6 space-y-8 flex-1 w-full">
    
    <div class="bg-blue-50 rounded-2xl shadow-sm border border-blue-200 p-6 text-center">
      <h3 class="text-lg font-bold text-blue-800 mb-2">הקישור שלכם לשליחה לאורחים:</h3>
      <div class="flex flex-col md:flex-row justify-center items-center gap-4">
        <input type="text" id="shareLink" readonly class="w-full md:w-2/3 bg-white border border-blue-300 rounded-lg p-3 text-left text-sm" dir="ltr">
        <button onclick="copyLink()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition w-full md:w-auto">העתק קישור</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="p-6 bg-slate-50 border-b border-slate-100">
        <h3 class="text-lg font-bold">הגדרות האירוע</h3>
      </div>
      
      <form id="eventSettingsForm" class="p-6 space-y-4 text-sm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-bold mb-1">שם האירוע</label>
            <input type="text" id="eventName" required class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">תמונת הזמנה</label>
            <input type="file" id="imageUpload" accept="image/*" class="w-full border p-1.5 rounded-lg bg-slate-50">
            <input type="hidden" id="imageUrl">
          </div>
          <div>
            <label class="block font-bold mb-1">תאריך האירוע</label>
            <input type="date" id="eventDate" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">שעת קבלת פנים</label>
            <input type="time" id="eventTime" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">שם האולם/מקום</label>
            <input type="text" id="locationName" required class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          <div>
            <label class="block font-bold mb-1">כתובת (מייצר Waze אוטומטית)</label>
            <input type="text" id="address" class="w-full border p-2 rounded-lg bg-slate-50">
          </div>
          
          <div class="md:col-span-2 border-t pt-4 mt-2">
            <label class="block font-bold mb-2 text-blue-600">קבלת מתנות ב-Bit</label>
            <div class="flex flex-col md:flex-row gap-4 mb-2">
              <div class="flex-1">
                <input type="text" id="bitLink" placeholder="הקישור יופיע כאן אוטומטית לאחר סריקת ה-QR..." class="w-full border border-blue-200 p-3 rounded-lg text-left bg-blue-50" dir="ltr">
              </div>
              <div class="flex-1">
                <label class="block w-full text-sm font-bold bg-blue-100 text-blue-800 p-3 rounded-lg cursor-pointer text-center hover:bg-blue-200 transition border border-blue-300">
                  📷 העלה תמונת QR של ביט
                  <input type="file" id="bitQrUpload" accept="image/*" class="hidden">
                </label>
              </div>
            </div>
          </div>
        </div>
        <button type="submit" id="saveEventBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition mt-4 w-full md:w-auto">
          שמור עדכונים
        </button>
        <p id="saveMsg" class="text-green-600 font-bold hidden mt-2">הנתונים נשמרו בהצלחה!</p>
      </form>
    </div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="p-6 bg-slate-50 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
        <h3 class="text-lg font-bold">ניהול אורחים</h3>
        <div class="flex items-center gap-3">
          <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded-lg transition shadow-sm">
            📥 הורד לאקסל
          </button>
          <span id="totalGuests" class="bg-blue-100 text-blue-800 text-sm font-bold px-4 py-2 rounded-full">סה"כ מגיעים: 0</span>
        </div>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse">
          <thead>
            <tr class="bg-slate-100 text-slate-600 text-sm">
              <th class="p-4 font-bold border-b">שם האורח</th>
              <th class="p-4 font-bold border-b">סטטוס</th>
              <th class="p-4 font-bold border-b text-center">כמות</th>
              <th class="p-4 font-bold border-b">ברכה</th>
              <th class="p-4 font-bold border-b text-center">פעולות</th>
            </tr>
          </thead>
          <tbody id="guestsTableBody" class="text-sm">
            <tr><td colspan="5" class="p-6 text-center text-slate-500">טוען אורחים...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <footer class="mt-8 mb-6 text-center p-4">
    <div class="bg-slate-200 h-px w-1/2 mx-auto mb-4"></div>
    <p class="text-sm font-bold text-slate-700">© כל הזכויות שמורות לסאן אורלביץ'.</p>
    <p class="text-xs text-slate-500 mt-1 max-w-lg mx-auto">
      אין להעתיק, לשכפל או להעביר מערכת זו.<br>
      <span class="text-red-500 font-semibold">שימו לב:</span> המערכת נמחקת אוטומטית כ-4 ימים לאחר האירוע.
    </p>
  </footer>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentEventId = null;
    let globalGuestsData = [];

    async function init() {
      const { data: { user } } = await mySupabase.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      loadEventDetails();
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await mySupabase.auth.signOut();
      window.location.href = 'login.html';
    });

    function copyLink() {
      const linkInput = document.getElementById('shareLink');
      linkInput.select();
      document.execCommand('copy');
      alert('הקישור הועתק!');
    }

    document.getElementById('bitQrUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          context.drawImage(img, 0, 0, img.width, img.height);
          const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code && code.data.includes('bitpay')) {
            document.getElementById('bitLink').value = code.data;
            alert('הקישור חולץ בהצלחה מהתמונה.');
          } else {
            alert('לא זיהינו קישור לביט בתמונה.');
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    async function loadEventDetails() {
      // התיקון הקריטי שבונה להם את הפרופיל!
      await mySupabase.from('profiles').upsert([{ id: currentUser.id, email: currentUser.email }]);

      let { data: events } = await mySupabase.from('events').select('*').eq('host_id', currentUser.id);
      
      if (!events || events.length === 0) {
        const { data: newEvent } = await mySupabase.from('events').insert([{ host_id: currentUser.id, event_name: 'האירוע שלנו', slug: 'event-' + Date.now() }]).select();
        events = newEvent;
      }
      
      const event = events[0];
      currentEventId = event.id;
      
      const shareUrl = window.location.origin + '/?event=' + currentEventId;
      document.getElementById('shareLink').value = shareUrl;

      document.getElementById('eventName').value = event.event_name || '';
      document.getElementById('imageUrl').value = event.image_url || '';
      document.getElementById('eventDate').value = event.event_date ? event.event_date.split('T')[0] : '';
      document.getElementById('eventTime').value = event.event_time || '';
      document.getElementById('locationName').value = event.location_name || '';
      document.getElementById('bitLink').value = event.bit_link || '';
      
      if (event.waze_link) {
         try { document.getElementById('address').value = decodeURIComponent(event.waze_link.split('q=')[1]); } catch(e){}
      }
      
      loadGuests();
    }

    document.getElementById('eventSettingsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveEventBtn');
      btn.innerText = 'שומר...'; btn.disabled = true;

      let finalImageUrl = document.getElementById('imageUrl').value;
      const fileInput = document.getElementById('imageUpload');
      
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        const { data, error } = await mySupabase.storage.from('invitations').upload(fileName, file);
        if (data) {
          finalImageUrl = SUPABASE_URL + '/storage/v1/object/public/invitations/' + fileName;
          document.getElementById('imageUrl').value = finalImageUrl;
        }
      }

      const address = document.getElementById('address').value;
      const wazeLink = address ? 'https://waze.com/ul?q=' + encodeURIComponent(address) : '';

      const updates = {
        event_name: document.getElementById('eventName').value,
        image_url: finalImageUrl,
        event_date: document.getElementById('eventDate').value,
        event_time: document.getElementById('eventTime').value,
        location_name: document.getElementById('locationName').value,
        waze_link: wazeLink,
        bit_link: document.getElementById('bitLink').value,
      };

      await mySupabase.from('events').update(updates).eq('id', currentEventId);
      
      btn.innerText = 'שמור עדכונים'; btn.disabled = false;
      const msg = document.getElementById('saveMsg');
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3000);
    });

    async function loadGuests() {
      const { data: guests } = await mySupabase.from('guests').select('*').eq('event_id', currentEventId).order('created_at', { ascending: false });
      
      globalGuestsData = guests || []; 
      const tbody = document.getElementById('guestsTableBody');
      tbody.innerHTML = '';
      let totalCount = 0;

      if (globalGuestsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-500">עדיין אין אישורי הגעה.</td></tr>';
        document.getElementById('totalGuests').innerText = `סה"כ מגיעים: 0`;
        return;
      }

      globalGuestsData.forEach(guest => {
        if (guest.attending) totalCount += (guest.guests_count || 0);
        const row = document.createElement('tr');
        row.className = 'border-b hover:bg-slate-50 transition';
        row.innerHTML = `
          <td class="p-4 font-medium">${guest.guest_name}</td>
          <td class="p-4">
            <button onclick="toggleAttending('${guest.id}', ${guest.attending})" class="px-3 py-1 rounded-full text-xs font-bold cursor-pointer hover:opacity-80 ${guest.attending ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
              ${guest.attending ? 'כן' : 'לא'} (שנה)
            </button>
          </td>
          <td class="p-4 text-center">
            <span class="font-bold cursor-pointer text-blue-600 hover:underline" onclick="editCount('${guest.id}', ${guest.guests_count})">
              ${guest.attending ? guest.guests_count + ' ✎' : '-'}
            </span>
          </td>
          <td class="p-4 text-slate-600 text-xs">${guest.blessing || ''}</td>
          <td class="p-4 text-center">
            <button onclick="deleteGuest('${guest.id}')" class="text-red-500 hover:text-red-700 font-bold text-sm">מחק</button>
          </td>
        `;
        tbody.appendChild(row);
      });
      document.getElementById('totalGuests').innerText = `סה"כ מגיעים: ${totalCount}`;
    }

    async function toggleAttending(id, currentStatus) {
      if(confirm('לשנות את סטטוס ההגעה?')) {
        await mySupabase.from('guests').update({ attending: !currentStatus }).eq('id', id);
        loadGuests();
      }
    }

    async function editCount(id, currentCount) {
      const newCount = prompt('הכנס כמות מגיעים חדשה:', currentCount);
      if(newCount !== null && !isNaN(newCount)) {
        await mySupabase.from('guests').update({ guests_count: parseInt(newCount) }).eq('id', id);
        loadGuests();
      }
    }

    async function deleteGuest(id) {
      if(confirm('בטוח שברצונך למחוק אורח זה לחלוטין?')) {
        await mySupabase.from('guests').delete().eq('id', id);
        loadGuests();
      }
    }

    function exportToExcel() {
      if (globalGuestsData.length === 0) { alert('אין אורחים לייצא'); return; }
      let csvContent = "\uFEFF"; 
      csvContent += "שם האורח,מגיע/ה?,כמות,ברכה,תאריך אישור\n";
      globalGuestsData.forEach(g => {
        const name = g.guest_name ? g.guest_name.replace(/,/g, '') : '';
        const attending = g.attending ? 'כן' : 'לא';
        const count = g.attending ? g.guests_count : 0;
        const blessing = g.blessing ? g.blessing.replace(/,/g, ' -').replace(/\n/g, ' ') : '';
        const date = new Date(g.created_at).toLocaleDateString('he-IL');
        csvContent += `${name},${attending},${count},${blessing},${date}\n`;
      });
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", "רשימת_אורחים.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
