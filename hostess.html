<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PLAN4ME - עמדת מארחת</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: 'Assistant', sans-serif;
      background:
        radial-gradient(700px 380px at 80% -6%, rgba(96,165,250,.16), transparent 60%),
        radial-gradient(600px 400px at 5% 40%, rgba(37,99,235,.1), transparent 65%),
        #1E2A47;
    }
    .card-anim { animation: card-in .5s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes card-in { 0% { opacity: 0; transform: translateY(14px); } 100% { opacity: 1; transform: none; } }
    .guest-in { animation: guest-in .3s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes guest-in { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: none; } }
    input:focus { box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
    button { transition: transform .15s ease, background-color .2s ease, box-shadow .2s ease; }
    button:active { transform: scale(.96); }
    .stat-num { font-variant-numeric: tabular-nums; }
    /* פס אור שחולף על רקע הכותרת */
    .hdr-sweep {
      position: absolute; top: 0; bottom: 0; width: 38%; left: 0;
      pointer-events: none; will-change: transform;
      transform: translateX(-150%) skewX(-18deg);
      background: linear-gradient(105deg, transparent, rgba(147,197,253,.16), transparent);
      animation: hdr-sweep 5.5s ease-in-out infinite;
    }
    @keyframes hdr-sweep { 0%, 45% { transform: translateX(-150%) skewX(-18deg); } 85%, 100% { transform: translateX(420%) skewX(-18deg); } }
    /* אורבים כחולים שנעים לאט בתוך הכותרת */
    .hdr-orb { position: absolute; border-radius: 50%; filter: blur(26px); pointer-events: none; }
    .hdr-orb.a { width: 150px; height: 150px; top: -50px; right: 8%; background: rgba(59,130,246,.35); animation: orb-drift 9s ease-in-out infinite; }
    .hdr-orb.b { width: 120px; height: 120px; bottom: -45px; left: 10%; background: rgba(147,197,253,.22); animation: orb-drift 11s ease-in-out 1.4s infinite reverse; }
    @keyframes orb-drift { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-18px, 10px) scale(1.12); } }
    /* נקודת "חי" פועמת */
    .pulse-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4ADE80; box-shadow: 0 0 8px #4ADE80; animation: pd 2s ease-in-out infinite; vertical-align: middle; margin-inline-end: 5px; }
    @keyframes pd { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    /* מונה שקופץ כשהערך משתנה */
    .stat-pop { animation: stat-pop .35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes stat-pop { 0% { transform: scale(1); } 45% { transform: scale(1.35); } 100% { transform: scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

    <div id="guestsContainer" class="p-4 space-y-3">

  <p class="text-[11px] text-slate-300 mt-4 text-center">מופעל על ידי PLAN4ME · העמדה מאובטחת בקישור אישי</p>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event');
    const token = urlParams.get('token');

    let allTables = [];
    let allGuests = [];

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    window.addEventListener('DOMContentLoaded', async () => {
      if (!eventId || !token) {
        document.getElementById('guestsContainer').innerHTML = '<p class="text-red-500 font-bold p-6 text-center">שגיאה: חסר מזהה אירוע או טוקן אבטחה בקישור.</p>';
        return;
      }
      await loadHostessData();
    });

    async function loadHostessData() {
      const { data, error } = await mySupabase.rpc('get_hostess_data', { p_event_id: eventId, p_token: token });
      if (error || !data) {
        document.getElementById('guestsContainer').innerHTML = '<p class="text-red-500 font-bold p-6 text-center">שגיאה בטעינת הנתונים (טוקן לא חוקי).</p>';
        return;
      }
      document.getElementById('eventTitle').innerText = data.event_name || 'עמדת מארחת';
      allTables = data.tables || []; allGuests = data.guests || [];
      renderGuests(allGuests);
      updateStats();
    }

    function updateStats() {
      const bar = document.getElementById('statsBar');
      bar.classList.remove('hidden');
      const arrived = allGuests.filter(g => g.arrived);
      setStat('statArrivedGroups', arrived.length);
      setStat('statArrivedPeople', arrived.reduce((s, g) => s + (g.guests_count || 0), 0));
      setStat('statTotal', allGuests.length);
    }
    function setStat(id, value) {
      const el = document.getElementById(id);
      if (el.innerText !== String(value)) {
        el.innerText = value;
        el.classList.remove('stat-pop');
        void el.offsetWidth; // איפוס האנימציה
        el.classList.add('stat-pop');
      }
    }

    function renderGuests(list) {
      const container = document.getElementById('guestsContainer');
      container.innerHTML = '';
      if (list.length === 0) { container.innerHTML = '<p class="text-center text-slate-400 py-8 font-bold">לא נמצאו אורחים תואמים 🤷‍♂️</p>'; return; }

      list.forEach(guest => {
        const table = allTables.find(t => t.id === guest.table_id);
        const tableName = table ? table.table_name : 'ללא שולחן';
        const hasArrived = guest.arrived || false;

        const card = document.createElement('div');
        card.className = `guest-in p-4 rounded-xl border-2 transition shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${hasArrived ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-100'}`;
        card.innerHTML = `
          <div class="flex-1 w-full">
            <div class="flex items-center gap-2 flex-wrap">
              <h4 class="font-extrabold text-slate-800 text-lg">${esc(guest.guest_name)}</h4>
              <span class="text-xs ${hasArrived ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-blue-50 text-blue-700 border-blue-100'} font-bold px-2.5 py-1 rounded-lg border">🪑 ${esc(tableName)}</span>
            </div>
            <div class="flex items-center gap-2 mt-3 bg-slate-50 p-1.5 rounded-xl border border-slate-200 w-fit">
              <span class="text-xs text-slate-500 font-bold px-1">כמות:</span>
              <button onclick="updateGuestCount('${guest.id}', ${guest.guests_count - 1})" aria-label="הפחתת כמות" class="w-10 h-10 bg-white text-slate-700 font-extrabold rounded-lg border-2 border-slate-200 active:bg-slate-100 flex items-center justify-center text-lg">-</button>
              <span class="stat-num font-extrabold text-slate-800 text-lg px-2.5">${guest.guests_count}</span>
              <button onclick="updateGuestCount('${guest.id}', ${guest.guests_count + 1})" aria-label="הוספת כמות" class="w-10 h-10 bg-white text-slate-700 font-extrabold rounded-lg border-2 border-slate-200 active:bg-slate-100 flex items-center justify-center text-lg">+</button>
            </div>
          </div>
          <div class="w-full sm:w-auto text-left">
            <button onclick="toggleArrival('${guest.id}', ${hasArrived})" class="w-full sm:w-auto text-sm font-extrabold px-5 py-3.5 rounded-xl transition shadow-sm border-2 flex items-center justify-center gap-2 ${hasArrived ? 'bg-emerald-600 hover:bg-emerald-700 text-white border-emerald-600 shadow-emerald-200' : 'bg-white hover:bg-blue-50 text-blue-700 border-blue-200'}">
              ${hasArrived ? '✅ באולם (הגיע)' : '📌 סמן כ-"הגיע"'}
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function updateGuestCount(guestId, newCount) {
      if (newCount < 1) return;
      const { error } = await mySupabase.rpc('hostess_update_count', { p_event_id: eventId, p_token: token, p_guest_id: guestId, p_count: newCount });
      if (error) { alert("שגיאה בעדכון"); return; }
      const g = allGuests.find(x => x.id === guestId); if (g) g.guests_count = newCount;
      filterGuests();
      updateStats();
    }

    async function toggleArrival(guestId, currentStatus) {
      const { error } = await mySupabase.rpc('hostess_toggle_arrival', { p_event_id: eventId, p_token: token, p_guest_id: guestId, p_arrived: !currentStatus });
      if (error) { alert("שגיאה בסימון הנוכחות."); return; }
      const g = allGuests.find(x => x.id === guestId); if (g) g.arrived = !currentStatus;
      filterGuests();
      updateStats();
    }

    function filterGuests() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) { renderGuests(allGuests); return; }
      const filtered = allGuests.filter(g => g.guest_name.toLowerCase().includes(query));
      renderGuests(filtered);
    }
  </script>
</body>
</html>
