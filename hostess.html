<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1 font-sans">
  <title>עמדת מארחת - אישורי הגעה והושבה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="min-h-screen p-2 md:p-4 flex flex-col items-center">

  <div class="w-full max-w-xl bg-white shadow-2xl rounded-2xl overflow-hidden border-t-4 border-amber-500">
    
    <div class="bg-slate-900 p-5 text-center text-white">
      <h2 id="eventTitle" class="text-xl font-extrabold tracking-wide">טוען פרטי אירוע...</h2>
      <p class="text-xs text-slate-400 mt-1">עמדת מארחת דיגיטלית - סימון הגעה ושינוי כמויות בזמן אמת 📲</p>
    </div>

    <div class="p-4 border-b bg-slate-50">
      <input type="text" id="searchInput" oninput="filterGuests()" placeholder="🔍 הקלידו שם של אורח לחיפוש מהיר..." 
             class="w-full border-2 border-slate-200 p-3 rounded-xl bg-white focus:outline-none focus:border-amber-500 text-right text-base font-bold shadow-sm">
    </div>

    <div class="p-3 space-y-3 max-h-[70vh] overflow-y-auto" id="guestsContainer">
      <p class="text-center text-sm text-slate-400 p-8">טוען רשימת אורחים מהשרת...</p>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allGuests = [];
    let allTables = [];

    // חילוץ ה-ID של האירוע מהכתובת
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event');

    window.addEventListener('DOMContentLoaded', async () => {
      if (!eventId) {
        document.body.innerHTML = '<div class="text-center p-8 font-bold text-red-500">❌ קישור לא תקין. חסר מזהה אירוע.</div>';
        return;
      }
      await loadHostessData();
    });

    async function loadHostessData() {
      // 1. שליפת שם האירוע
      const { data: event } = await mySupabase.from('events').select('event_name').eq('id', eventId).single();
      if (event) {
        document.getElementById('eventTitle').innerText = event.event_name;
      }

      // 2. שליפת השולחנות
      const { data: tables } = await mySupabase.from('tables').select('*').eq('event_id', eventId);
      allTables = tables || [];

      // 3. שליפת האורחים שאישרו הגעה (כן או אולי)
      const { data: guests } = await mySupabase.from('guests')
        .select('*')
        .eq('event_id', eventId)
        .eq('attending', true)
        .order('guest_name', { ascending: true });
        
      allGuests = guests || [];
      renderGuests(allGuests);
    }

    function renderGuests(list) {
      const container = document.getElementById('guestsContainer');
      container.innerHTML = '';

      if (list.length === 0) {
        container.innerHTML = '<p class="text-center text-sm text-slate-400 p-8">לא נמצאו אורחים תואמים 🤷‍♂️</p>';
        return;
      }

      list.forEach(guest => {
        // מציאת שם השולחן לפי ה-ID
        const table = allTables.find(t => t.id === guest.table_id);
        const tableName = table ? table.table_name : 'ללא שולחן';

        // בדיקה האם האורח כבר סומן כמי שהגיע בפועל לאולם
        // אנחנו משתמשים בשדה בשם `arrived` (במידה ולא קיים בטבלה, סופרבייס יתייחס אליו כ-false/null)
        const hasArrived = guest.arrived || false;

        const card = document.createElement('div');
        card.className = `p-4 rounded-xl border transition shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${hasArrived ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-100'}`;
        
        card.innerHTML = `
          <div class="flex-1 w-full">
            <div class="flex items-center gap-2">
              <h4 class="font-extrabold text-slate-800 text-lg">${guest.guest_name}</h4>
              <span class="text-xs bg-slate-100 text-slate-600 font-bold px-2 py-0.5 rounded border border-slate-200">🪑 ${tableName}</span>
            </div>
            
            <div class="flex items-center gap-2 mt-3 bg-slate-50 p-1.5 rounded-lg border border-slate-200 w-fit">
              <span class="text-xs text-slate-500 font-bold px-1">כמות:</span>
              <button onclick="updateGuestCount('${guest.id}', ${guest.guests_count - 1})" class="w-7 h-7 bg-white text-slate-700 font-bold rounded-md border active:bg-slate-100 flex items-center justify-center text-sm">-</button>
              <span class="font-extrabold text-slate-800 text-base px-2">${guest.guests_count}</span>
              <button onclick="updateGuestCount('${guest.id}', ${guest.guests_count + 1})" class="w-7 h-7 bg-white text-slate-700 font-bold rounded-md border active:bg-slate-100 flex items-center justify-center text-sm">+</button>
            </div>
          </div>

          <div class="w-full sm:w-auto text-left">
            <button onclick="toggleArrival('${guest.id}', ${hasArrived})" 
                    class="w-full sm:w-auto text-sm font-bold px-5 py-2.5 rounded-xl transition shadow-sm border flex items-center justify-center gap-2 ${hasArrived ? 'bg-emerald-600 hover:bg-emerald-700 text-white border-emerald-600' : 'bg-white hover:bg-slate-50 text-slate-700 border-slate-200'}">
              ${hasArrived ? '✅ באולם (הגיע)' : '📌 סמן כ-"הגיע"'}
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // פונקציה לעדכון כמות האורחים בזמן אמת מהכפתורים
    async function updateGuestCount(guestId, newCount) {
      if (newCount < 1) return; // מניעה של ירידה מתחת ל-1
      
      const { error } = await mySupabase.from('guests').update({ guests_count: newCount }).eq('id', guestId);
      if (error) {
        alert("שגיאה בעדכון הכמות: " + error.message);
      } else {
        // עדכון הלוקאל דאטה כדי לא להטעין הכל מחדש
        const guest = allGuests.find(g => g.id === guestId);
        if (guest) guest.guests_count = newCount;
        renderGuests(document.getElementById('searchInput').value ? allGuests.filter(g => g.guest_name.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase())) : allGuests);
      }
    }

    // פונקציית סימון הגיע/לא הגיע לאולם
    async function toggleArrival(guestId, currentStatus) {
      // במידה והעמודה `arrived` עדיין לא קיימת פיזית, אנחנו נטמיע אותה דינמית בעדכון
      const { error } = await mySupabase.from('guests').update({ arrived: !currentStatus }).eq('id', guestId);
      if (error) {
        // אם העמודה לא קיימת, סופרבייס ייצר שגיאה, אז אנחנו נטפל בזה בצורה חלקה
        alert("שגיאה בסימון האורח. אנא ודא שהרצת את קוד ה-SQL בסופרבייס.");
      } else {
        const guest = allGuests.find(g => g.id === guestId);
        if (guest) guest.arrived = !currentStatus;
        renderGuests(document.getElementById('searchInput').value ? allGuests.filter(g => g.guest_name.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase())) : allGuests);
      }
    }

    // פילטר מהיר לחיפוש שמות בלייב
    function filterGuests() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) {
        renderGuests(allGuests);
        return;
      }
      const filtered = allGuests.filter(g => g.guest_name.toLowerCase().includes(query));
      renderGuests(filtered);
    }
  </script>
</body>
</html>
