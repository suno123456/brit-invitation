<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>עמדת מארחת - אישורי הגעה והושבה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

  <div class="w-full max-w-xl bg-white shadow-xl rounded-2xl overflow-hidden border-t-4 border-amber-500">
    
    <div class="bg-slate-800 p-6 text-center text-white">
      <h2 id="eventTitle" class="text-xl font-bold">טוען פרטי אירוע...</h2>
      <p class="text-xs text-slate-400 mt-1">עמדת מארחת דיגיטלית - חיפוש אורחים והושבה בזמן אמת</p>
    </div>

    <div class="p-5 border-b bg-slate-50">
      <div class="relative">
        <input type="text" id="searchInput" oninput="filterGuests()" placeholder="🔍 הקלידו שם של אורח לחיפוש מהיר..." 
               class="w-full border-2 border-slate-200 p-3 rounded-xl bg-white focus:outline-none focus:border-amber-500 text-right text-base font-semibold shadow-sm">
      </div>
    </div>

    <div class="p-4 space-y-3 max-h-[65vh] overflow-y-auto" id="guestsContainer">
      <p class="text-center text-sm text-slate-400 p-8">טוען רשימת אורחים מהשרת...</p>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allGuests = [];
    let allTables = [];

    // חילוץ ה-ID של האירוע מתוך הכתובת
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event');

    window.addEventListener('DOMContentLoaded', async () => {
      if (!eventId) {
        document.body.innerHTML = '<div class="text-center p-8 font-bold text-red-500">❌ קישור לא תקין. חסר מזהה אירוע.</div>';
        return;
      }
      await loadHostessData();
    });

    async function loadHostessData() {
      // 1. שליפת שם האירוע
      const { data: event } = await mySupabase.from('events').select('event_name').eq('id', eventId).single();
      if (event) {
        document.getElementById('eventTitle').innerText = event.event_name;
      }

      // 2. שליפת השולחנות
      const { data: tables } = await mySupabase.from('tables').select('*').eq('event_id', eventId);
      allTables = tables || [];

      // 3. שליפת האורחים (רק אלו שאישרו הגעה!)
      const { data: guests } = await mySupabase.from('guests').select('*').eq('event_id', eventId).eq('attending', true).order('guest_name', { ascending: true });
      allGuests = guests || [];

      renderGuests(allGuests);
    }

    function renderGuests(list) {
      const container = document.getElementById('guestsContainer');
      container.innerHTML = '';

      if (list.length === 0) {
        container.innerHTML = '<p class="text-center text-sm text-slate-400 p-8">לא נמצאו אורחים תואמים 🤷‍♂️</p>';
        return;
      }

      list.forEach(guest => {
        // מציאת שם השולחן לפי ה-ID
        const table = allTables.find(t => t.id === guest.table_id);
        const tableName = table ? table.table_name : '❌ לא שובץ שולחן';
        const tableClass = table ? 'bg-amber-100 text-amber-800' : 'bg-red-50 text-red-600 border border-red-200';

        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex justify-between items-center transition hover:border-slate-300";
        card.innerHTML = `
          <div>
            <h4 class="font-bold text-slate-800 text-base">👤 ${guest.guest_name}</h4>
            <p class="text-xs text-slate-500 mt-0.5">כמות אורחים: <span class="font-bold text-slate-700">${guest.guests_count}</span></p>
          </div>
          <div class="text-left">
            <span class="text-sm font-bold px-3 py-1.5 rounded-lg inline-block ${tableClass}">
              🪑 ${tableName}
            </span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // פונקציית חיפוש מטורפת בזמן אמת (פילטר מהיר בלייב)
    function filterGuests() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) {
        renderGuests(allGuests);
        return;
      }
      const filtered = allGuests.filter(g => g.guest_name.toLowerCase().includes(query));
      renderGuests(filtered);
    }
  </script>
</body>
</html>
