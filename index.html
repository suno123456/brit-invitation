<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>אישורי הגעה לברית</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Assistant', sans-serif;
      background-color: #fcfbf8; 
    }
    .text-invitation-blue { color: #6b8eb3; }
    .text-invitation-gold { color: #bfa473; }
    .bg-invitation-blue { background-color: #6b8eb3; }
    .hover-bg-invitation-blue:hover { background-color: #5a7b9c; }
    .border-invitation-gold { border-color: #bfa473; }
    .focus-ring-blue:focus { 
      outline: none;
      box-shadow: 0 0 0 2px #6b8eb3;
    }
  </style>
</head>
<body class="text-slate-700 p-4 flex justify-center items-center min-h-screen">

  <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden text-center border-t-4 border-invitation-gold my-4">
    
    <img src="invitation.jpeg" alt="הזמנה לברית" class="w-full h-auto object-cover border-b border-gray-100">

    <div class="p-6 md:p-8">
      
      <div id="mainContent">
        <h2 class="text-2xl font-bold text-invitation-blue mb-4">נשמח לראותכם! 💙</h2>

        <div class="bg-slate-50 rounded-2xl p-4 mb-6 border border-gray-100">
          <div class="flex justify-center items-center space-x-8 space-x-reverse text-invitation-blue mb-4">
            <div class="text-center">
              <p class="text-xs text-gray-500 mb-0.5">יום שישי</p>
              <p class="font-bold text-lg">26.06.26</p>
            </div>
            <div class="h-8 border-l border-invitation-gold opacity-50"></div>
            <div class="text-center">
              <p class="text-xs text-gray-500 mb-0.5">בשעה</p>
              <p class="font-bold text-lg">12:30</p>
            </div>
          </div>
          
          <div class="text-center mb-4">
            <p class="text-sm font-bold text-invitation-blue">אולם אפטאון אורבן</p>
            <p class="text-xs text-gray-500">רחוב ערבה 1, גבעת שמואל</p>
          </div>

          <a href="https://waze.com/ul?q=ערבה+1+גבעת+שמואל" target="_blank" class="flex items-center justify-center w-full border border-invitation-gold text-invitation-gold hover:bg-invitation-gold hover:text-white font-bold py-2 rounded-xl transition duration-300 text-sm">
            ניווט לאירוע
          </a>
        </div>

        <form id="rsvpForm" onsubmit="handleFormSubmit(event)" class="space-y-4 text-right">
          <div>
            <label class="block text-sm font-bold mb-1 text-invitation-blue">שם מלא:</label>
            <input type="text" name="name" required class="w-full border border-gray-200 p-2.5 rounded-xl bg-slate-50 focus-ring-blue transition-all">
          </div>

          <div>
            <label class="block text-sm font-bold mb-1 text-invitation-blue">האם תגיעו?</label>
            <select name="attending" id="attending" onchange="toggleGuestCount()" class="w-full border border-gray-200 p-2.5 rounded-xl bg-slate-50 focus-ring-blue transition-all cursor-pointer">
              <option value="yes">כן, נגיע בשמחה! 🎉</option>
              <option value="no">לצערי לא נוכל להגיע</option>
            </select>
          </div>

          <div id="guestField">
            <label class="block text-sm font-bold mb-1 text-invitation-blue">כמות מגיעים:</label>
            <input type="number" name="guests" value="1" min="1" class="w-full border border-gray-200 p-2.5 rounded-xl bg-slate-50 focus-ring-blue transition-all text-center">
          </div>

          <div>
            <label class="block text-sm font-bold mb-1 text-invitation-blue">ברכה:</label>
            <textarea name="blessing" rows="2" placeholder="מזל טוב! 💙" class="w-full border border-gray-200 p-2.5 rounded-xl bg-slate-50 focus-ring-blue transition-all resize-none"></textarea>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-invitation-blue hover-bg-invitation-blue text-white text-lg font-bold py-3.5 rounded-xl shadow-md transition duration-300 mt-2">
            שליחת אישור
          </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
          <p class="text-sm text-slate-500 mb-3 font-medium">רוצים לשמח את ההורים במתנה?</p>
          <a href="https://www.bitpay.co.il/app/me/0C86BE34-AB28-D2B4-7C68-20985CB784DEA397" target="_blank" class="inline-flex items-center justify-center border-2 border-invitation-gold text-invitation-gold hover:bg-invitation-gold hover:text-white font-bold py-3 px-8 rounded-xl transition duration-300 text-base shadow-sm w-full">
            🎁 שליחת מתנה בביט
          </a>
        </div>
      </div>

      <div id="successMessage" class="hidden py-4 animate-fade-in">
        <div class="text-invitation-blue text-5xl mb-4">🎉</div>
        <h3 class="text-3xl font-bold text-invitation-blue mb-2">תודה רבה!</h3>
        <p id="successText" class="text-slate-600 font-medium mb-6 text-lg">האישור התקבל בהצלחה!</p>
        
        <div class="bg-blue-50 rounded-2xl p-6 border border-blue-100 mt-4 shadow-sm">
          <p class="text-base text-slate-700 mb-4 font-bold">לנוחיותכם, ניתן להעביר מתנה בביט:</p>
          <a href="https://www.bitpay.co.il/app/me/0C86BE34-AB28-D2B4-7C68-20985CB784DEA397" target="_blank" class="flex items-center justify-center w-full bg-invitation-blue hover-bg-invitation-blue text-white font-bold py-4 rounded-xl shadow-md transition duration-300 text-lg">
            🎁 מעבר מהיר לביט
          </a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsSD3yd67bsFQb-WwpnrLqugeqFE72Co8Wjo5kkyC546Sf-HsicQgiAVmRZEaYM3M/exec';

    function toggleGuestCount() {
      var attending = document.getElementById("attending").value;
      var guestField = document.getElementById("guestField");
      guestField.classList.toggle("hidden", attending === "no");
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "שולח אישור...";

      var form = document.getElementById("rsvpForm");
      var isAttending = form.attending.value === "yes";
      
      var formData = {
        name: form.name.value,
        attending: form.attending.value,
        guests: isAttending ? parseInt(form.guests.value) : 0,
        blessing: form.blessing.value
      };

      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(() => {
        document.getElementById("mainContent").classList.add("hidden");
        
        var successText = document.getElementById("successText");
        if (isAttending) {
          successText.innerText = "האישור התקבל, נשמח מאוד לראותכם 💙";
        } else {
          successText.innerText = "תודה שעדכנתם אותנו, ניפגש בשמחות הבאות 💙";
        }

        document.getElementById("successMessage").classList.remove("hidden");
      })
      .catch(error => {
        alert("אירעה שגיאה בשמירה. נסה שנית.");
        btn.disabled = false;
        btn.innerText = "שליחת אישור";
        console.error(error);
      });
    }
  </script>
</body>
</html>
