<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>הזמנה לאירוע</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Assistant', sans-serif; background-color: #fcfbf8; }
    .theme-color { color: #6b8eb3; }
    .bg-theme { background-color: #6b8eb3; }
    .border-theme-light { border-color: #bfa473; }
    /* אנימציית טעינה */
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6b8eb3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-700 p-4 flex justify-center items-center min-h-screen">

  <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden text-center border-t-4 border-theme-light my-4 min-h-[400px] flex flex-col relative">
    
    <div id="loadingScreen" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-50">
      <div class="loader mb-4"></div>
      <p class="text-slate-500 font-bold">טוען את פרטי ההזמנה...</p>
    </div>

    <img id="displayImage" src="" alt="הזמנה" class="w-full h-auto object-cover border-b border-gray-100 hidden">

    <div class="p-6 md:p-8 flex-1">
      
      <div id="mainContent" class="hidden">
        <h2 id="displayEventName" class="text-2xl font-bold theme-color mb-4">נשמח לראותכם! 💙</h2>

        <div class="bg-slate-50 rounded-2xl p-4 mb-6 border border-gray-100">
          <div class="flex justify-center items-center space-x-8 space-x-reverse theme-color mb-4">
            <div class="text-center">
              <p class="text-xs text-gray-500 mb-0.5">תאריך</p>
              <p id="displayDate" class="font-bold text-lg">-</p>
            </div>
            <div class="h-8 border-l border-theme-light opacity-50"></div>
            <div class="text-center">
              <p class="text-xs text-gray-500 mb-0.5">בשעה</p>
              <p id="displayTime" class="font-bold text-lg">-</p>
            </div>
          </div>
          
          <div class="text-center mb-4">
            <p id="displayLocation" class="text-sm font-bold theme-color">-</p>
          </div>

          <a id="displayWaze" href="#" target="_blank" class="flex items-center justify-center w-full border border-theme-light text-yellow-700 hover:bg-yellow-50 font-bold py-2 rounded-xl transition duration-300 text-sm">
            ניווט לאירוע ב-Waze
          </a>
        </div>

        <form id="rsvpForm" class="space-y-4 text-right">
          <div>
            <label class="block text-sm font-bold mb-1 theme-color">שם מלא:</label>
            <input type="text" name="name" required class="w-full border p-2.5 rounded-xl bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 theme-color">האם תגיעו?</label>
            <select name="attending" id="attending" onchange="document.getElementById('guestField').classList.toggle('hidden', this.value==='no')" class="w-full border p-2.5 rounded-xl bg-slate-50 cursor-pointer">
              <option value="yes">כן, נגיע בשמחה!</option>
              <option value="no">לצערי לא נוכל להגיע</option>
            </select>
          </div>
          <div id="guestField">
            <label class="block text-sm font-bold mb-1 theme-color">כמות מגיעים:</label>
            <input type="number" name="guests" value="1" min="1" class="w-full border p-2.5 rounded-xl bg-slate-50 text-center">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 theme-color">ברכה:</label>
            <textarea name="blessing" rows="2" class="w-full border p-2.5 rounded-xl bg-slate-50 resize-none"></textarea>
          </div>
          <button type="submit" id="submitBtn" class="w-full bg-theme text-white text-lg font-bold py-3.5 rounded-xl shadow-md transition mt-2 hover:opacity-90">
            שליחת אישור
          </button>
        </form>

        <div id="bitSection" class="mt-8 pt-6 border-t border-gray-200 text-center hidden">
          <p class="text-sm text-slate-500 mb-3 font-medium">רוצים לשמח במתנה?</p>
          <a id="displayBit" href="#" target="_blank" class="inline-flex items-center justify-center border-2 border-blue-400 text-blue-600 hover:bg-blue-50 font-bold py-3 px-8 rounded-xl transition text-base w-full">
            🎁 שליחת מתנה בביט
          </a>
        </div>
      </div>

      <div id="successMessage" class="hidden py-4 animate-fade-in">
        <div class="theme-color text-5xl mb-4">🎉</div>
        <h3 class="text-3xl font-bold theme-color mb-2">תודה רבה!</h3>
        <p id="successText" class="text-slate-600 font-medium mb-6 text-lg">האישור התקבל.</p>
        
        <div id="successBitSection" class="bg-blue-50 rounded-2xl p-6 border border-blue-100 mt-4 hidden shadow-sm">
          <p class="text-base text-slate-700 mb-4 font-bold">לנוחיותכם, ניתן להעביר מתנה בביט:</p>
          <a id="successBitLink" href="#" target="_blank" class="flex items-center justify-center w-full bg-theme text-white font-bold py-4 rounded-xl shadow-md text-lg hover:opacity-90">
            🎁 מעבר מהיר לביט
          </a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event');

    window.addEventListener('DOMContentLoaded', async () => {
      if (!eventId) {
        document.getElementById('loadingScreen').innerHTML = '<p class="text-red-500 font-bold p-6">שגיאה: חסר מזהה אירוע בקישור. נא להיכנס דרך הקישור המלא.</p>';
        return;
      }

      const { data: event, error } = await mySupabase.from('events').select('*').eq('id', eventId).single();

      if (error || !event) {
        document.getElementById('loadingScreen').innerHTML = '<p class="text-red-500 font-bold p-6">האירוע לא נמצא.</p>';
        return;
      }

      if(event.image_url) {
        const img = document.getElementById('displayImage');
        img.src = event.image_url;
        img.classList.remove('hidden');
      }
      
      document.getElementById('displayEventName').innerText = event.event_name;
      
      // תיקון התאריך! מבודד רק את התאריך לפני ההיפוך
      let formattedDate = '-';
      if (event.event_date) {
        const datePart = event.event_date.split('T')[0];
        formattedDate = datePart.split('-').reverse().join('.');
      }
      document.getElementById('displayDate').innerText = formattedDate;

      document.getElementById('displayTime').innerText = event.event_time || '-';
      document.getElementById('displayLocation').innerText = event.location_name || '-';
      
      if(event.waze_link) {
        document.getElementById('displayWaze').href = event.waze_link;
      } else {
        document.getElementById('displayWaze').classList.add('hidden');
      }

      if(event.bit_link) {
        document.getElementById('bitSection').classList.remove('hidden');
        document.getElementById('displayBit').href = event.bit_link;
        document.getElementById('successBitSection').classList.remove('hidden');
        document.getElementById('successBitLink').href = event.bit_link;
      }

      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
    });

    document.getElementById('rsvpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.innerText = "שולח...";

      const form = e.target;
      const isAttending = form.attending.value === "yes";
      
      const { error } = await mySupabase.from('guests').insert([{
        event_id: eventId,
        guest_name: form.name.value,
        attending: isAttending,
        guests_count: isAttending ? parseInt(form.guests.value) : 0,
        blessing: form.blessing.value
      }]);

      if (error) {
        alert("שגיאה בשמירה. נסה שנית.");
        btn.disabled = false; btn.innerText = "שליחת אישור";
      } else {
        document.getElementById("mainContent").classList.add("hidden");
        document.getElementById("successText").innerText = isAttending ? "האישור התקבל, נשמח לראותכם 💙" : "תודה שעדכנתם, ניפגש בשמחות 💙";
        document.getElementById("successMessage").classList.remove("hidden");
        // גלילה חלקה למעלה כדי לראות את הודעת ההצלחה
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  </script>
</body>
</html>
