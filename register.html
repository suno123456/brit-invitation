<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>רכישת מערכת אישורי הגעה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden border-t-4 border-blue-600">
    
    <div class="bg-blue-600 p-6 text-center text-white">
      <h2 class="text-2xl font-bold">רכישת מערכת אישורי הגעה</h2>
      <p class="text-blue-100 mt-2 text-sm">הפכו את האירוע שלכם לחכם ומסודר ב-2 צעדים פשוטים!</p>
    </div>

    <div class="p-6 md:p-8 space-y-8">
      
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-5 text-center">
        <span class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">שלב 1</span>
        <h3 class="text-lg font-bold text-blue-800 mt-3 mb-2">תשלום מאובטח ב-Bit</h3>
        <p class="text-sm text-slate-600 mb-4">העבירו את התשלום עבור המערכת כדי להפעיל את החשבון שלכם.</p>
        
        <a href="https://www.bitpay.co.il/app/me/D4AE99EF-ACE6-96F6-3BB9-0D9CC8616EC99B68" target="_blank" 
           class="inline-flex items-center justify-center w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300 shadow-md">
          💳 מעבר לתשלום ב-Bit
        </a>
      </div>

      <div class="border border-gray-200 rounded-xl p-5">
        <div class="text-center mb-4">
          <span class="bg-slate-700 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">שלב 2</span>
          <h3 class="text-lg font-bold text-slate-800 mt-3">יצירת חשבון מנהל</h3>
          <p class="text-sm text-slate-500">לאחר התשלום, מלאו את הפרטים לקבלת גישה מיידית.</p>
        </div>

        <form id="registerForm" class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-700">שם מלא (כפי שמופיע בביט):</label>
            <input type="text" id="fullName" required placeholder="למשל: ישראל ישראלי" 
                   class="w-full border border-gray-300 p-3 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-right">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-700">מספר נייד:</label>
            <input type="tel" id="phone" required placeholder="050-0000000" 
                   class="w-full border border-gray-300 p-3 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-right" dir="ltr">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-700">כתובת אימייל (לכניסה למערכת):</label>
            <input type="email" id="email" required placeholder="example@gmail.com" 
                   class="w-full border border-gray-300 p-3 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-right">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-700">בחירת סיסמה (לפחות 6 תווים):</label>
            <input type="password" id="password" required placeholder="******" minlength="6"
                   class="w-full border border-gray-300 p-3 rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-right">
          </div>
          
          <div class="flex items-start gap-2 mt-4 bg-red-50 p-3 rounded-lg border border-red-100">
            <input type="checkbox" id="confirmPayment" required class="mt-1 w-4 h-4 cursor-pointer">
            <label for="confirmPayment" class="text-xs text-slate-700 font-medium cursor-pointer">
              <span class="text-red-600 font-bold">חובה לסמן:</span> אני מאשר/ת שביצעתי כעת העברה בביט. ידוע לי שחשבונות שיפתחו ללא תשלום מאומת יימחקו לצמיתות מהמערכת בתוך מספר שעות.
            </label>
          </div>
          
          <button type="submit" id="submitBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-md mt-2">
            שילמתי בביט - פתח לי את המערכת!
          </button>
        </form>
        <p id="errorMsg" class="text-red-500 mt-4 hidden font-medium text-sm text-center"></p>
      </div>

      <div class="text-center text-sm text-slate-500 pt-4 border-t">
        כבר רכשתם ויש לכם חשבון? <a href="login.html" class="text-blue-600 font-bold hover:underline">התחברו כאן</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ghfgqwslakjqmxuboobn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZmdxd3NsYWtqcW14dWJvb2JuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc0NDksImV4cCI6MjA5ODIxMzQ0OX0.c5QuVRyTrmbGr_JZJDyokxG_ZnT0zi8FpVsBocJ-BIA';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // המפתח שהוצאת מ-Web3Forms
    const WEB3FORMS_ACCESS_KEY = '2733bd06-8639-4b9f-8a73-56195b1b4a3a';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!document.getElementById('confirmPayment').checked) {
        alert("חובה לאשר את ביצוע התשלום לפני פתיחת החשבון.");
        return;
      }

      const fullName = document.getElementById('fullName').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true; btn.innerText = 'מקים מערכת...';
      errorMsg.classList.add('hidden');

      // 1. יצירת המשתמש
      const { data, error } = await mySupabase.auth.signUp({ email: email, password: password });

      if (error) {
        errorMsg.classList.remove('hidden');
        errorMsg.innerText = error.message.includes('already registered') ? 'האימייל הזה כבר רשום במערכת.' : 'אירעה שגיאה. ודא שהסיסמה מעל 6 תווים.';
        btn.disabled = false; btn.innerText = 'שילמתי בביט - פתח לי את המערכת!';
        return;
      } 
      
      // 2. שמירת הפרופיל
      if (data.user) {
        await mySupabase.from('profiles').upsert([{ 
          id: data.user.id, 
          email: email,
          full_name: fullName,
          phone: phone
        }]);
      }

      // 3. שליחת התראת המייל אלייך
      try {
        await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            access_key: WEB3FORMS_ACCESS_KEY,
            subject: '🚀 לקוח חדש נרשם למערכת אישורי ההגעה!',
            from_name: 'מערכת המכירות',
            message: `יש לך לקוח חדש שצריך אימות תשלום בביט!\n\nשם מלא: ${fullName}\nטלפון: ${phone}\nאימייל: ${email}\n\nכנס עכשיו לאפליקציית ביט וודא שהתשלום אכן נכנס.`
          })
        });
      } catch (err) {
        console.error("שגיאה בשליחת המייל", err);
      }
      
      // מעבר לדאשבורד
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
